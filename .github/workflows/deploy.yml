name: Build and deploy to Azure Container Apps

# Pushes to main rebuild the image in ACR and roll the Container App to it.
# Auth is passwordless via GitHub -> Azure OIDC federation (no secrets stored).
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "infra/**"
  # Weekly rebuild so the container base image (node + OS packages) picks up
  # security patches even when no code is pushed. Without this, the running
  # image only gets refreshed on a code merge and can go stale for weeks.
  schedule:
    - cron: "0 11 * * 1" # Mondays 11:00 UTC (~3-4am PT)
  workflow_dispatch: {}

permissions:
  id-token: write # required to request the OIDC token
  contents: read

env:
  RESOURCE_GROUP: W2-SBCSS-District-NetMon-Dashboard
  ACR_NAME: w2sbcssnetmondashacr
  IMAGE: netmon-dashboard
  CONTAINER_APP: w2-sbcss-netmon-web
  MIGRATE_JOB: w2-sbcss-netmon-migrate

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC, no password)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure containerapp CLI extension
        run: az extension add --name containerapp --upgrade --only-show-errors

      - name: Build web image in ACR (server-side build)
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE:${{ github.sha }}" \
            --image "$IMAGE:latest" \
            .

      # The ingest + migrate Jobs run SEPARATE images (Dockerfile --target ingest
      # / migrator), not the web image. Without rebuilding them here they run
      # stale code: a change to the ingester or migrations would silently never
      # reach the scheduled Jobs. Build both on every deploy so all three images
      # stay in lockstep with main.
      - name: Build ingest image in ACR
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE-ingest:${{ github.sha }}" \
            --image "$IMAGE-ingest:latest" \
            --target ingest \
            .

      - name: Build migrator image in ACR
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE-migrator:${{ github.sha }}" \
            --image "$IMAGE-migrator:latest" \
            --target migrator \
            .

      # The maintenance Job (daily cleanup) runs its own image (Dockerfile
      # --target maintenance): purge old time-series, VACUUM, prune SFTP. Rebuild
      # on every deploy so its code stays in lockstep with main.
      - name: Build maintenance image in ACR
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE-maintenance:${{ github.sha }}" \
            --image "$IMAGE-maintenance:latest" \
            --target maintenance \
            .

      # The tunnel-broker is a SEPARATE tiny Node service (broker/) with its own
      # Dockerfile + context — not part of the Next build. Build it here so its
      # image stays in lockstep with main; the broker Container App is rolled at
      # the end (guarded until infra/broker.bicep has provisioned it).
      - name: Build broker image in ACR
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "netmon-broker:${{ github.sha }}" \
            --image "netmon-broker:latest" \
            --file broker/Dockerfile \
            broker

      - name: Point ingest Job at the new image
        # Jobs don't have revisions; update the template so the next scheduled
        # (or manual) execution pulls the freshly built ingest image.
        run: |
          az containerapp job update \
            --name w2-sbcss-netmon-ingest \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE-ingest:${{ github.sha }}"

      - name: Point AI analysis Job at the new image
        # Same reasoning as the ingest Job: w2-sbcss-netmon-ai runs the migrator
        # image (full source + tsx), so without re-pointing it here the scheduled
        # AI sweep would keep running stale code after every deploy.
        run: |
          az containerapp job update \
            --name w2-sbcss-netmon-ai \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE-migrator:${{ github.sha }}"

      - name: Point enrich Job at the new image
        # Nightly device re-classification job (migrator image). Guarded so the
        # code deploy still succeeds before the job is provisioned via main.bicep.
        run: |
          az containerapp job update \
            --name w2-sbcss-netmon-enrich \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE-migrator:${{ github.sha }}" \
            || echo "enrich job not provisioned yet — apply infra/main.bicep to create it"

      - name: Point maintenance Job at the new image
        # Daily cleanup job (maintenance image). Guarded so the deploy still
        # succeeds before the job is provisioned (created out-of-band via az /
        # infra/main.bicep).
        run: |
          az containerapp job update \
            --name w2-sbcss-netmon-maintenance \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE-maintenance:${{ github.sha }}" \
            || echo "maintenance job not provisioned yet — create it via az / infra/main.bicep"

      - name: Apply DB migrations (in-VNet job) before rolling
        # Migrations run INSIDE the VNet (private Postgres has no public endpoint),
        # so they go through the migrate Job, not this runner. Point it at the
        # freshly-built migrator image, run it, and WAIT — failing the deploy (so
        # the app does NOT roll onto a schema it expects but doesn't have) if it
        # errors. Makes schema changes automatic + ordered before the new code
        # serves. Idempotent: a no-op when no migration is pending.
        run: |
          set -euo pipefail
          az containerapp job update \
            --name "$MIGRATE_JOB" --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE-migrator:${{ github.sha }}"
          az containerapp job start --name "$MIGRATE_JOB" --resource-group "$RESOURCE_GROUP" -o none
          sleep 8
          exec_name=$(az containerapp job execution list \
            --name "$MIGRATE_JOB" --resource-group "$RESOURCE_GROUP" \
            --query "sort_by([].{name:name,start:properties.startTime}, &start) | [-1].name" -o tsv)
          echo "Migration execution: $exec_name"
          for i in $(seq 1 90); do
            status=$(az containerapp job execution show \
              --name "$MIGRATE_JOB" --resource-group "$RESOURCE_GROUP" \
              --job-execution-name "$exec_name" --query "properties.status" -o tsv 2>/dev/null || echo "Unknown")
            echo "[$i] migration status: $status"
            if [ "$status" = "Succeeded" ]; then echo "Migrations applied."; exit 0; fi
            if [ "$status" = "Failed" ]; then echo "::error::Migration failed — not rolling the app."; exit 1; fi
            sleep 10
          done
          echo "::error::Migration did not finish in time — not rolling the app."
          exit 1

      - name: Roll Container App to the new image
        # --revision-suffix forces a fresh revision on every run. On scheduled
        # rebuilds the git SHA is unchanged, so without a unique suffix the
        # image reference would be identical and Container Apps would NOT roll —
        # the freshly-patched image would never deploy. run_number guarantees
        # uniqueness across runs.
        run: |
          az containerapp update \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE:${{ github.sha }}" \
            --revision-suffix "r${{ github.run_number }}"

      - name: Roll broker to the new image
        # Independent revision lifecycle from the web app. Guarded so a deploy
        # still succeeds before infra/broker.bicep has created the broker app.
        run: |
          az containerapp update \
            --name w2-sbcss-netmon-broker \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/netmon-broker:${{ github.sha }}" \
            --revision-suffix "r${{ github.run_number }}" \
            || echo "broker not provisioned yet — apply infra/broker.bicep to create it"
