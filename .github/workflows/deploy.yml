name: Build and deploy to Azure Container Apps

# Pushes to main rebuild the image in ACR and roll the Container App to it.
# Auth is passwordless via GitHub -> Azure OIDC federation (no secrets stored).
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "infra/**"
  # Weekly rebuild so the container base image (node + OS packages) picks up
  # security patches even when no code is pushed. Without this, the running
  # image only gets refreshed on a code merge and can go stale for weeks.
  schedule:
    - cron: "0 11 * * 1" # Mondays 11:00 UTC (~3-4am PT)
  workflow_dispatch: {}

permissions:
  id-token: write # required to request the OIDC token
  contents: read

env:
  RESOURCE_GROUP: W2-SBCSS-District-NetMon-Dashboard
  ACR_NAME: w2sbcssnetmondashacr
  IMAGE: netmon-dashboard
  CONTAINER_APP: w2-sbcss-netmon-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC, no password)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure containerapp CLI extension
        run: az extension add --name containerapp --upgrade --only-show-errors

      - name: Build web image in ACR (server-side build)
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE:${{ github.sha }}" \
            --image "$IMAGE:latest" \
            .

      # The ingest + migrate Jobs run SEPARATE images (Dockerfile --target ingest
      # / migrator), not the web image. Without rebuilding them here they run
      # stale code: a change to the ingester or migrations would silently never
      # reach the scheduled Jobs. Build both on every deploy so all three images
      # stay in lockstep with main.
      - name: Build ingest image in ACR
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE-ingest:${{ github.sha }}" \
            --image "$IMAGE-ingest:latest" \
            --target ingest \
            .

      - name: Build migrator image in ACR
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE-migrator:${{ github.sha }}" \
            --image "$IMAGE-migrator:latest" \
            --target migrator \
            .

      - name: Point ingest Job at the new image
        # Jobs don't have revisions; update the template so the next scheduled
        # (or manual) execution pulls the freshly built ingest image.
        run: |
          az containerapp job update \
            --name w2-sbcss-netmon-ingest \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE-ingest:${{ github.sha }}"

      - name: Point AI analysis Job at the new image
        # Same reasoning as the ingest Job: w2-sbcss-netmon-ai runs the migrator
        # image (full source + tsx), so without re-pointing it here the scheduled
        # AI sweep would keep running stale code after every deploy.
        run: |
          az containerapp job update \
            --name w2-sbcss-netmon-ai \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE-migrator:${{ github.sha }}"

      - name: Roll Container App to the new image
        # --revision-suffix forces a fresh revision on every run. On scheduled
        # rebuilds the git SHA is unchanged, so without a unique suffix the
        # image reference would be identical and Container Apps would NOT roll —
        # the freshly-patched image would never deploy. run_number guarantees
        # uniqueness across runs.
        run: |
          az containerapp update \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE:${{ github.sha }}" \
            --revision-suffix "r${{ github.run_number }}"
