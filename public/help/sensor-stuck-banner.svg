<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 210" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <!-- attention banner -->
  <rect x="0.5" y="0.5" width="759" height="96" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <path d="M28 24 l9 16 h-18 z" fill="#f59e0b"/>
  <rect x="31.5" y="30" width="2" height="6" rx="1" fill="#ffffff"/>
  <circle cx="32.5" cy="38.5" r="1.1" fill="#ffffff"/>
  <text x="46" y="34" font-size="15" font-weight="700" fill="#111827">Needs attention</text>
  <circle cx="30" cy="58" r="2" fill="#6b7280"/>
  <text x="40" y="62" font-size="12.5" fill="#374151"><tspan font-weight="600">No version reported</tspan> — auto-update never recorded a commit; its git/update step is failing</text>
  <circle cx="30" cy="80" r="2" fill="#6b7280"/>
  <text x="40" y="84" font-size="12.5" fill="#374151"><tspan font-weight="600">No fresh data</tspan> — online, but the last scan reached the dashboard 18h ago</text>
  <!-- status mini row -->
  <rect x="0.5" y="116.5" width="759" height="86" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="24" y="142" font-size="12" fill="#9ca3af" letter-spacing="0.5">AGENT VERSION</text>
  <text x="24" y="164" font-size="14" font-family="ui-monospace, monospace" fill="#111827">0.1.0</text>
  <text x="300" y="142" font-size="12" fill="#9ca3af" letter-spacing="0.5">REPORTED COMMIT</text>
  <text x="300" y="164" font-size="16" font-family="ui-monospace, monospace" font-weight="700" fill="#dc2626">—</text>
  <text x="300" y="186" font-size="11" fill="#9ca3af">(blank = the box never recorded a version)</text>
  <text x="560" y="142" font-size="12" fill="#9ca3af" letter-spacing="0.5">LAST CHECK-IN</text>
  <text x="560" y="164" font-size="14" fill="#16a34a">2 minutes ago</text>
</svg>
